                  {
                    "type": "custom:cronostar-card",
                    "preset_type": "thermostat",
                    "global_prefix": "cronostar_thermostat_appartamento_",
                    "target_entity": "climate.climatizzazione_appartamento",
                    "title": "CronoStar Thermostat",
