# ============================================================================
# SENSORS (PLATFORM)
# ============================================================================
sensor:
  # Reboot Service
  # - platform: reboot_service
  #- !include yaml_generator/managed_sensors/fix_duplicates_legacy.yaml

  # Statistics Sensors
  - platform: statistics
    name: statistics_temperatura_bagno_variance
    state_characteristic: variance
    entity_id: sensor.temperatura_bagno
    unique_id: sensor.temperatura_bagno_variance
    max_age:
      minutes: 4

  - platform: statistics
    name: statistics_temperatura_cucina_variance
    state_characteristic: variance
    entity_id: sensor.th1a_temperature
    unique_id: sensor.temperatura_cucina_variance
    max_age:
      minutes: 5

  - platform: statistics
    name: statistics_temperatura_camera_grande_variance
    state_characteristic: variance
    entity_id: sensor.temperatura_camera_grande
    unique_id: sensor.temperatura_camera_grande_variance
    max_age:
      minutes: 4

  - platform: statistics
    name: statistics_temperatura_camera_variance
    state_characteristic: variance
    entity_id: sensor.temperatura_camera
    unique_id: sensor.temperatura_camera_variance
    max_age:
      minutes: 4

  - platform: statistics
    name: statistics_temperatura_sala_variance
    state_characteristic: variance
    entity_id: sensor.temperatura_sala
    unique_id: sensor.temperatura_sala_variance
    max_age:
      minutes: 4

  # InfluxDB
  - platform: influxdb
    api_version: 2
    ssl: false
    token: VwnOdiOeE5fGqtgj00OLReRCeRJfCklVZzcatPE0ncJkZ1m3tXEFwGGC659PK7bX2fPwUWCBJ-kKJM6C4gcSlw==
    organization: ViaGrande50
    bucket: HAData
    host: 127.0.0.1
    port: 8086
    queries_flux:
      - range_start: "-10d"
        name: "How long have I been here"
        query: >
          filter(fn: (r) => r["_measurement"] == "climate.camera_grande" )
          |> filter(fn: (r) => r["_field"] == "current_temperature")

  # Media Mobile per Ricarica EV
  - platform: filter
    name: "EV Charge 2025 Solar Max Ampere Smoothed"
    unique_id: ev_charge_2025_solar_max_ampere_smoothed
    entity_id: sensor.ev_charge_2025_solar_max_ampere
    filters:
      - filter: time_simple_moving_average
        window_size: "00:00:10"
        precision: 1

