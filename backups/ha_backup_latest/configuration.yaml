# ============================================================================
# HOMEASSISTANT CORE
# ============================================================================
homeassistant:
  customize: !include customize.yaml
  #allowlist_external_dirs:
  #  - /config/cronostar
  #  - /config/www/cronostar_profiles
  packages: !include_dir_named packages

# ============================================================================
# TEMPLATE ENTITIES (CONSOLIDATO)
# ============================================================================
template:
  # Sensors e Binary Sensors da file esterni
  - sensor: !include_dir_merge_list yaml_generator/managed_sensors/
  - !include yaml_generator/ev_charge_2025_triggers.yaml
  - binary_sensor: !include_dir_merge_list yaml_generator/managed_binary_sensors/
  - !include yaml_generator/managed_persistence/bagno_persistence.yaml
  - !include yaml_generator/managed_persistence/camera_grande_persistence.yaml
  - !include yaml_generator/managed_persistence/camera_persistence.yaml
  - !include yaml_generator/managed_persistence/corridoio_persistence.yaml
  - !include yaml_generator/managed_persistence/cucina_persistence.yaml
  - !include yaml_generator/managed_persistence/sala_persistence.yaml
  - !include yaml_generator/managed_persistence/th_persistence.yaml
  - !include yaml_generator/managed_persistence/consumo_netto_pdc_persistence.yaml

  # Template Sensor - Luce Scale Infos
  - sensor:
      - unique_id: luce_scale_switch_infos
        name: Luce scale switch infos
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: "{{ ((states('sensor.sonoff_10024024c4_power_1') | float(0)) + (states('sensor.sonoff_10024024c4_power_2') | float(0))) | round(2) }}"
        attributes:
          power: "{{ ((states('sensor.sonoff_10024024c4_power_1') | float(0)) + (states('sensor.sonoff_10024024c4_power_2') | float(0))) }}"
          current: "{{ ((states('sensor.sonoff_10024024c4_current_1') | float(0)) + (states('sensor.sonoff_10024024c4_current_2') | float(0))) }}"
          switch_1_attributes: "{{ states.sensor.sonoff_10024024c4_power_1.attributes | default({}) }}"
          switch_2_attributes: "{{ states.sensor.sonoff_10024024c4_power_2.attributes | default({}) }}"

  # Template Light - Luce Scale
  - light:
      - unique_id: luce_scale_switch
        name: Luce scale
        state: >-
          {% set p1 = states('sensor.sonoff_10024024c4_power_1') %}
          {% set p2 = states('sensor.sonoff_10024024c4_power_2') %}
          {% if has_value('sensor.sonoff_10024024c4_power_1') or has_value('sensor.sonoff_10024024c4_power_2') %}
            {{ (p1 | float(0) + p2 | float(0)) > 7 }}
          {% else %}
            {{ states('light.luce_scale_switch') == 'on' }}
          {% endif %}
        availability: >-
          {{ has_value('sensor.sonoff_10024024c4_power_1') or has_value('sensor.sonoff_10024024c4_power_2') }}
        turn_on:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_1
                    state: "off"
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_2
                    state: "off"
                sequence:
                  - action: switch.turn_on
                    target:
                      entity_id: switch.sonoff_10024024c4_1

              - conditions:
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_1
                    state: "off"
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_2
                    state: "on"
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: switch.sonoff_10024024c4_2
                  - delay: "0:00:00.300000"
                  - action: switch.turn_on
                    target:
                      entity_id: switch.sonoff_10024024c4_1

              - conditions:
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_1
                    state: "on"
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_2
                    state: "on"
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: switch.sonoff_10024024c4_2

              - conditions:
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_1
                    state: "on"
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_2
                    state: "off"
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: switch.sonoff_10024024c4_1
                  - delay: "0:00:00.300000"
                  - action: switch.turn_on
                    target:
                      entity_id: switch.sonoff_10024024c4_2

          - action: system_log.write
            data:
              level: info
              message: "Luce scale Turn ON - Switch1: {{ states('switch.sonoff_10024024c4_1') }}, Switch2: {{ states('switch.sonoff_10024024c4_2') }}, Power: {{ (states('sensor.sonoff_10024024c4_power_1') | float(0)) + (states('sensor.sonoff_10024024c4_power_2') | float(0)) }}W"

        turn_off:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_1
                    state: "on"
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_2
                    state: "off"
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: switch.sonoff_10024024c4_1
                  - delay: "0:00:00.300000"
                  - action: switch.turn_on
                    target:
                      entity_id: switch.sonoff_10024024c4_2

              - conditions:
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_1
                    state: "off"
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_2
                    state: "on"
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: switch.sonoff_10024024c4_2
                  - delay: "0:00:00.300000"
                  - action: switch.turn_on
                    target:
                      entity_id: switch.sonoff_10024024c4_1

              - conditions:
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_1
                    state: "on"
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_2
                    state: "on"
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: switch.sonoff_10024024c4_1

              - conditions:
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_1
                    state: "off"
                  - condition: state
                    entity_id: switch.sonoff_10024024c4_2
                    state: "off"
                sequence:
                  - action: switch.turn_on
                    target:
                      entity_id: switch.sonoff_10024024c4_1
                  - delay: "0:00:00.300000"
                  - action: switch.turn_off
                    target:
                      entity_id: switch.sonoff_10024024c4_1

          - action: system_log.write
            data:
              level: info
              message: "Luce scale Turn OFF - Switch1: {{ states('switch.sonoff_10024024c4_1') }}, Switch2: {{ states('switch.sonoff_10024024c4_2') }}, Power: {{ (states('sensor.sonoff_10024024c4_power_1') | float(0)) + (states('sensor.sonoff_10024024c4_power_2') | float(0)) }}W"

