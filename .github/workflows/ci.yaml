name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anyio
          pip install -r requirements.test.txt
          
      - name: Run tests with coverage
        continue-on-error: true
        run: |
          pytest -v --cov=custom_components/cronostar --cov-report=term-missing | tee pytest-coverage.txt
          
      - name: Extract Coverage
        id: extract_coverage
        run: |
          # Use a more robust way to find the TOTAL line and extract the percentage
          COVERAGE=$(grep "TOTAL" pytest-coverage.txt | awk '{print $NF}' | grep -o '[0-9]\+' | head -n 1 || echo "0")
          echo "Extracted coverage: $COVERAGE"
          if [ -z "$COVERAGE" ]; then
            echo "Warning: Could not extract coverage, setting to 0"
            COVERAGE=0
          fi
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          
      - name: Create Coverage Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: cronostar_coverage.json
          label: Backend Coverage
          message: ${{ steps.extract_coverage.outputs.coverage }}%
          valColorRange: ${{ steps.extract_coverage.outputs.coverage }}
          maxColorRange: 100
          minColorRange: 0
          forceUpdate: true

  frontend-tests:
    name: Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: cronostar_card/package-lock.json

      - name: Install dependencies
        run: cd cronostar_card && npm ci

      - name: Run tests with coverage
        run: cd cronostar_card && npm run test:coverage | tee vitest-coverage.txt

      - name: Extract Coverage
        id: extract_coverage
        run: |
          # Vitest output typically has a "All files" row.
          # We look for the first percentage after "All files"
          COVERAGE=$(grep "All files" cronostar_card/vitest-coverage.txt | awk -F'|' '{print $2}' | grep -o '[0-9.]\+' | head -n 1 | cut -d. -f1 || echo "0")
          echo "Extracted frontend coverage: $COVERAGE"
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Create Frontend Coverage Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: cronostar_frontend_coverage.json
          label: Frontend Coverage
          message: ${{ steps.extract_coverage.outputs.coverage }}%
          valColorRange: ${{ steps.extract_coverage.outputs.coverage }}
          maxColorRange: 100
          minColorRange: 0
          forceUpdate: true
